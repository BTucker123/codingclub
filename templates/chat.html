<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Coding Club - Chatroom</title>
    <style>
        #chat-box {
            width: 100%;
            height: 300px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            padding: 10px;
            background: #f9f9f9;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .message { margin-bottom: 8px; }
        .author { font-weight: bold; color: #007bff; }
        .time { font-size: 11px; color: #888; margin-left: 5px; }
    </style>
</head>
<body>
    <h1>Coding Club Live Chat</h1>
    <h3><a href="{{ url_for('homepage') }}">Back to Home</a></h3>

    <div id="chat-box"></div>

    <!-- Message Sender Form -->
    <form id="chat-form">
        <input type="text" id="msg-content" placeholder="Type a message..." required style="width: 75%; padding: 8px;">
        <button type="submit" style="padding: 8px 15px;">Send</button>
    </form>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const msgContent = document.getElementById('msg-content');

        // Function to load updates into the chat box automatically
        function fetchMessages() {
            fetch('/getChatData')
                .then(response => response.json())
                .then(data => {
                    chatBox.innerHTML = '';
                    data.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'message';
                        div.innerHTML = `<span class="author">${msg.author}</span><span class="time">${msg.date}</span><br><span>${msg.content}</span>`;
                        chatBox.appendChild(div);
                    });
                });
        }

        // Send a new message to the backend log without reloading the page
        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('content', msgContent.value);

            fetch('/chat', {
                method: 'POST',
                body: formData
            }).then(() => {
                msgContent.value = '';
                fetchMessages(); // Immediately refresh log
            });
        });

        // Run chat fetch functions automatically
        fetchMessages();
        setInterval(fetchMessages, 3000); // Check for new messages every 3 seconds
    </script>
</body>
</html>
