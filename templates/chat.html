<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Coding Club Chatroom</title>
</head>
<body>
    <h1>Coding Club Chatroom :)</h1>
    <a href="{{ url_for('homepage') }}">Home</a>

    <div class="r">
        <form id="chat">
            <input type="hidden" name="type" value="newPost">
            <textarea id="content" name="content" rows="2" cols="30" placeholder="Chat..."></textarea>
        </form>
    </div>

    <div class="r" id="di">
        {% for post in posts|reverse %}
            <p>{{ post.author }} ({{ post.date }}): {{ post.content }}</p>
        {% endfor %}
    </div>


    <script>
        const myName = "{{ session['name'] }}";  // get name from session

        function highlightName(text) {
            const regex = new RegExp(`(${myName})`, "gi"); // match name, case-insensitive
            return text.replace(regex, '<span class="highlight">$1</span>');
        }
    </script>
    <script>
        const chatForm = document.getElementById("chat");
        const chatDiv = document.getElementById("di");
        let lastIndex = {{ posts|length }};

        chatForm.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                const formData = new FormData(chatForm);
                fetch("/chat", {
                    method: "POST",
                    body: formData
                }).then(() => {
                    chatForm.reset();
                    fetchNewMessages();
                });
            }
        });

        function fetchNewMessages() {
            fetch("/getChatData")
                .then(res => res.json())
                .then(data => {
                    if (data.length > lastIndex) {
                        const newMessages = data.slice(lastIndex).reverse();
                        newMessages.forEach(item => {
                            const p = document.createElement("p");
                            p.innerHTML = highlightName(`${item.author} (${item.date}): ${item.content}`);
                            chatDiv.insertBefore(p, chatDiv.firstChild);
                        });
                        lastIndex = data.length;
                    }
                });
        }

        setInterval(fetchNewMessages, 5000);
    </script>
</body>
</html>
