<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Club Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Curator Panel</h1>
    <h3><a href="{{url_for('homepage')}}">Home</a></h3>
    <form action="/admin" method="post">
        <input type="hidden" name="type" value="addUser">
        <input type="text" name="name" placeholder="Full name">
        <input type="number" name="rank" placeholder="Rank (0 highest, 2 lowest)">
        <input type="submit" value="Add Member">
    </form>
    <div class="r">
        <form method="post" action="/admin">
            <input type="hidden" name="type" value="addResc">
            <input type="text" name="url" placeholder="URL">
            <input type="text" name="title" placeholder="Title of link">
            <input type="submit" value="Add Rescource">
        </form>
        <hr>
        <form method="post" action="/admin">
            <input type="hidden" name="type" value="bulletinAdd">
            <input type="text" name="content" placeholder="Content">
            <input type="submit" value="Add Bulletin">
        </form>
        <hr>
        <form method="post" action="/admin">
            <input type="hidden" name="type" value="clearChat">
            <input type="submit" value="Clear Chat">
        </form>
    </div>
</body>
</html>
